server {
    listen 80;
    listen [::]:80;
    server_name orenpro.pro www.orenpro.pro;
    return 301 https://orenpro.pro$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orenpro.pro;

    # === SSL (ВАШИ РЕАЛЬНЫЕ ПУТИ ИЗ /root/cert/) ===
    ssl_certificate /root/cert/orenpro.pro/fullchain.pem;
    ssl_certificate_key /root/cert/orenpro.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # === HSTS ===
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # === Security Headers ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # === Content-Security-Policy (умеренная) ===
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self'; \
        style-src 'self' 'unsafe-inline'; \
        img-src 'self' data: blob:; \
        font-src 'self'; \
        connect-src 'self'; \
        media-src 'self'; \
        frame-src 'none'; \
        object-src 'none'; \
        base-uri 'self'; \
        form-action 'self'; \
        manifest-src 'self'; \
        worker-src 'self'; \
        frame-ancestors 'self';" always;

    # === Корень сайта (ВАШ РЕАЛЬНЫЙ ПУТЬ) ===
    root /var/www/html;
    index index.html;

    # === GZIP сжатие ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        application/ld+json
        image/svg+xml
        font/woff2
        font/woff
        font/ttf
        font/otf;

    # === SEO: Редирект старых .shtml на новые .html ===
    rewrite ^/(.*)\.shtml$ /$1.html permanent;

    # === Кеширование Vite-ассетов (хешированные файлы) ===
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # === Self-hosted шрифты ===
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # === Service Worker (НИКОГДА не кешировать) ===
    location = /sw.js {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
        access_log off;
    }

    # === manifest.json ===
    location = /manifest.json {
        expires 1h;
        add_header Cache-Control "public";
        add_header Content-Type "application/manifest+json";
    }

    # === robots.txt, ai.txt, sitemap.xml ===
    location ~ ^/(robots\.txt|ai\.txt|sitemap\.xml)$ {
        expires 0;
        add_header Cache-Control "no-cache";
    }

    # === Фавиконы и картинки ===
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    # === HTML-страницы (короткий кеш, чтобы обновления подхватывались) ===
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # === Обработка 404 ===
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # === Главная маршрутизация ===
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # === Запрет доступа к служебным файлам ===
    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }
    location ~ \.(log|bak|swp|tmp)$ {
        deny all;
        return 404;
    }
    location ~ ^/(tmp|backup|nginx)/ {
        deny all;
        return 404;
    }
}

# === WWW → non-WWW redirect ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.orenpro.pro;

    ssl_certificate /root/cert/orenpro.pro/fullchain.pem;
    ssl_certificate_key /root/cert/orenpro.pro/privkey.pem;

    return 301 https://orenpro.pro$request_uri;
}
